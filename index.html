<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>COCOAS Mail Dashboard｜大宮与野校</title>
<style>
  :root{
    --teal:#0F6E56; --teal-d:#0a4d3c; --teal-l:#1D9E75; --accent:#2bb789;
    --bg:#f4f6f4; --card:#ffffff; --line:#e7e8e3; --line2:#eceee9;
    --tx:#1d2420; --tx2:#5f6b64; --tx3:#90998f;
    --blue-b:#E6F1FB; --blue-t:#0C447C;
    --amber-b:#FAEEDA; --amber-t:#854F0B;
    --green-b:#EAF3DE; --green-t:#27500A;
    --gray-b:#F1EFE8; --gray-t:#5F5E5A;
    --purple-b:#EEEDFE; --purple-t:#3C3489;
    --pink-b:#FBEAF0; --pink-t:#72243E;
    --radius:14px;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{font-family:system-ui,-apple-system,"Hiragino Kaku Gothic ProN","Hiragino Sans","Noto Sans JP",sans-serif;background:var(--bg);color:var(--tx);font-size:14px;line-height:1.6;-webkit-font-smoothing:antialiased;}
  .app{display:flex;min-height:100vh;}
  .sidebar{width:248px;background:var(--teal-d);color:#dfeee8;flex-shrink:0;display:flex;flex-direction:column;position:sticky;top:0;height:100vh;}
  .brand{padding:20px 20px 16px;display:flex;align-items:center;gap:11px;border-bottom:1px solid rgba(255,255,255,.08);}
  .brand .logo{width:38px;height:38px;border-radius:10px;background:var(--accent);display:flex;align-items:center;justify-content:center;color:#06281f;flex-shrink:0;}
  .brand .name{font-size:15px;font-weight:600;color:#fff;line-height:1.2;}
  .brand .sub{font-size:11px;color:#9fc7b8;}
  .nav{padding:12px 12px;flex:1;overflow:auto;}
  .nav-label{font-size:10.5px;letter-spacing:.08em;color:#7faa9b;padding:14px 12px 6px;text-transform:uppercase;}
  .nav a{display:flex;align-items:center;gap:11px;padding:10px 12px;border-radius:10px;color:#cfe3da;text-decoration:none;font-size:13.5px;margin-bottom:2px;cursor:pointer;}
  .nav a:hover{background:rgba(255,255,255,.07);color:#fff;}
  .nav a.active{background:var(--teal-l);color:#fff;font-weight:500;}
  .nav a svg{width:18px;height:18px;flex-shrink:0;}
  .nav .badge{margin-left:auto;background:#f0a23a;color:#3a2403;font-size:11px;font-weight:600;padding:1px 7px;border-radius:99px;}
  .side-foot{padding:14px 18px;border-top:1px solid rgba(255,255,255,.08);font-size:11.5px;color:#9fc7b8;}
  .main{flex:1;min-width:0;display:flex;flex-direction:column;}
  .topbar{background:var(--card);border-bottom:1px solid var(--line);padding:14px 26px;display:flex;align-items:center;gap:16px;position:sticky;top:0;z-index:20;}
  .topbar h1{font-size:18px;font-weight:600;margin:0;}
  .topbar .crumb{font-size:12px;color:var(--tx3);}
  .spacer{flex:1;}
  .sender-chip{display:flex;align-items:center;gap:7px;font-size:12.5px;color:var(--tx2);background:var(--bg);padding:7px 12px;border-radius:10px;border:1px solid var(--line);}
  .content{padding:24px 26px;max-width:1140px;width:100%;}
  section[data-page][hidden]{display:none;}
  button{font-family:inherit;cursor:pointer;}
  .btn{display:inline-flex;align-items:center;gap:7px;font-size:13.5px;padding:9px 15px;border-radius:10px;border:1px solid var(--line);background:#fff;color:var(--tx);transition:.12s;}
  .btn:hover{background:#f7f8f6;}
  .btn svg{width:16px;height:16px;}
  .btn-primary{background:var(--teal);border-color:var(--teal);color:#fff;font-weight:500;}
  .btn-primary:hover{background:var(--teal-d);}
  .btn-sm{padding:6px 11px;font-size:12.5px;}
  .btn-ghost{border-color:transparent;background:transparent;color:var(--tx2);}
  .btn-ghost:hover{background:#f0f1ee;}
  .btn[disabled]{opacity:.5;cursor:not-allowed;}
  .grid{display:grid;gap:16px;}
  .card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:18px 20px;}
  .card h3{font-size:14.5px;font-weight:600;margin:0 0 14px;display:flex;align-items:center;gap:8px;}
  .card h3 svg{width:17px;height:17px;color:var(--teal);}
  .metric{display:flex;align-items:center;gap:14px;}
  .metric .ico{width:46px;height:46px;border-radius:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
  .metric .ico svg{width:22px;height:22px;}
  .metric .num{font-size:26px;font-weight:600;line-height:1;}
  .metric .lab{font-size:12.5px;color:var(--tx2);margin-top:3px;}
  .pill{font-size:11.5px;padding:3px 9px;border-radius:99px;white-space:nowrap;font-weight:500;}
  .st-問い合わせ{background:var(--gray-b);color:var(--gray-t);}
  .st-体験予約{background:var(--blue-b);color:var(--blue-t);}
  .st-体験済{background:var(--amber-b);color:var(--amber-t);}
  .st-入園意向{background:var(--green-b);color:var(--green-t);}
  .st-入園決定{background:var(--purple-b);color:var(--purple-t);}
  .st-在園{background:var(--teal);color:#fff;}
  .tag{font-size:11px;padding:2px 8px;border-radius:6px;background:var(--bg);color:var(--tx2);border:1px solid var(--line);}
  table{width:100%;border-collapse:collapse;}
  th{text-align:left;font-size:11.5px;color:var(--tx3);font-weight:500;padding:8px 10px;border-bottom:1px solid var(--line);text-transform:uppercase;letter-spacing:.03em;}
  td{padding:11px 10px;border-bottom:1px solid var(--line2);font-size:13.5px;vertical-align:middle;}
  tr:last-child td{border-bottom:none;}
  .row-name{font-weight:500;}
  .row-sub{font-size:12px;color:var(--tx3);}
  .avatar{width:34px;height:34px;border-radius:50%;background:var(--teal-l);color:#fff;display:inline-flex;align-items:center;justify-content:center;font-size:12.5px;font-weight:600;}
  input,select,textarea{font-family:inherit;font-size:13.5px;color:var(--tx);background:#fff;border:1px solid var(--line);border-radius:10px;padding:9px 11px;width:100%;outline:none;}
  input:focus,select:focus,textarea:focus{border-color:var(--teal-l);box-shadow:0 0 0 3px rgba(29,158,117,.13);}
  label{font-size:12px;color:var(--tx2);display:block;margin-bottom:5px;}
  .field{margin-bottom:14px;}
  .seg{display:inline-flex;border:1px solid var(--line);border-radius:10px;overflow:hidden;}
  .seg button{border:none;background:#fff;padding:8px 16px;font-size:13px;color:var(--tx2);}
  .seg button.on{background:var(--teal);color:#fff;}
  .task{display:flex;align-items:center;gap:12px;padding:11px 0;border-bottom:1px solid var(--line2);}
  .task:last-child{border-bottom:none;}
  .task .tdot{width:9px;height:9px;border-radius:50%;flex-shrink:0;}
  .funnel-row{display:flex;align-items:center;gap:12px;margin-bottom:9px;}
  .funnel-row .fl{width:78px;font-size:12.5px;color:var(--tx2);}
  .funnel-bar{flex:1;height:24px;background:#f0f1ee;border-radius:7px;overflow:hidden;}
  .funnel-bar > div{height:100%;border-radius:7px;display:flex;align-items:center;padding-left:9px;color:#fff;font-size:12px;font-weight:600;}
  .reci{display:flex;align-items:center;gap:10px;padding:9px 11px;border:1px solid var(--line);border-radius:10px;margin-bottom:7px;cursor:pointer;background:#fff;}
  .reci.on{border-color:var(--teal-l);background:#f1faf6;}
  .reci input{width:auto;}
  .chips{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:12px;}
  .chip{font-size:12px;padding:5px 12px;border-radius:99px;border:1px solid var(--line);background:#fff;color:var(--tx2);cursor:pointer;}
  .chip.on{background:var(--teal);border-color:var(--teal);color:#fff;}
  .preview{background:var(--bg);border:1px solid var(--line);border-radius:10px;padding:13px 15px;white-space:pre-wrap;font-size:12.8px;line-height:1.7;max-height:440px;overflow:auto;}
  .send-log{display:flex;flex-direction:column;gap:7px;margin-top:12px;}
  .send-log .li{display:flex;align-items:center;gap:9px;font-size:12.8px;color:var(--tx2);}
  .pbar{height:7px;background:#eceee9;border-radius:99px;overflow:hidden;margin-top:6px;}
  .pbar > div{height:100%;width:0;background:var(--teal-l);transition:width .25s;}
  .modal-bg{position:fixed;inset:0;background:rgba(20,28,24,.45);display:flex;align-items:center;justify-content:center;z-index:60;padding:20px;}
  .modal{background:#fff;border-radius:16px;width:500px;max-width:100%;max-height:90vh;overflow:auto;padding:24px;}
  .modal h2{font-size:17px;margin:0 0 18px;}
  .agenda{display:flex;gap:14px;align-items:flex-start;padding:14px 0;border-bottom:1px solid var(--line2);}
  .agenda:last-child{border-bottom:none;}
  .agenda .date{width:62px;flex-shrink:0;text-align:center;}
  .agenda .date .d{font-size:22px;font-weight:600;line-height:1;}
  .agenda .date .m{font-size:11px;color:var(--tx3);}
  .cal-banner{background:#f1faf6;border:1px dashed var(--teal-l);border-radius:var(--radius);padding:16px 18px;display:flex;align-items:center;gap:14px;}
  .muted{color:var(--tx2);font-size:12.5px;}
  .empty{text-align:center;color:var(--tx3);padding:30px;font-size:13px;}
  @media(max-width:880px){.sidebar{display:none;}.content{padding:18px;}}
</style>
</head>

      <section data-page="staff" hidden></section>
      <section data-page="audit" hidden></section>
      <section data-page="settings" hidden></section>
    </div>
  </div>
</div>
<div id="modalRoot"></div>

function ic(n){return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">'+(ICONS[n]||'')+'</svg>';}

var WD=['日','月','火','水','木','金','土'];
function pad(n){return n<10?'0'+n:''+n;}
function iso(d){return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate());}
function addDays(n){var d=new Date();d.setHours(0,0,0,0);d.setDate(d.getDate()+n);return d;}
function todayISO(){return iso(addDays(0));}
function fmt(s){if(!s)return'';var p=s.split('-');var d=new Date(+p[0],+p[1]-1,+p[2]);return (+p[1])+'/'+(+p[2])+'（'+WD[d.getDay()]+'）';}
function fmtShort(s){var p=s.split('-');return {d:+p[2],m:(+p[1])+'月'};}
function yen(n){return '¥'+Number(n||0).toLocaleString();}

function nextDelivery(d){
  var now=addDays(0),y=now.getFullYear(),mo=now.getMonth();
  if(d.rule==='daily')return now;
  if(d.rule==='monthly'){var t=new Date(y,mo,d.day);if(t<now)t=new Date(y,mo+1,d.day);return t;}
  if(d.rule==='annual'){var t=new Date(y,d.month,d.day);if(t<now)t=new Date(y+1,d.month,d.day);return t;}
  if(d.rule==='quarter'){var ms=[2,5,8,11],cs=[];[y,y+1].forEach(function(yy){ms.forEach(function(m){cs.push(new Date(yy,m+1,0));});});cs=cs.filter(function(t){return t>=now;}).sort(function(a,b){return a-b;});return cs[0];}
  return null;
}
function daysUntil(t){return Math.round((t-addDays(0))/86400000);}

/* shared sequential sender */
function sendSeq(list,tplLabel,bodyTpl,ctx,btn,log,bar,perPerson){
  if(!list.length){log.innerHTML='<div class="li" style="color:#A32D2D;">送信先が選択されていません。</div>';return;}
  btn.disabled=true;log.innerHTML='';bar.style.width='0%';
  var i=0,now=new Date(),stamp=pad(now.getHours())+':'+pad(now.getMinutes());
  function step(){
    if(i>=list.length){
      btn.disabled=false;
      var done=el('div',{class:'li'},ic('check')+'<span style="color:#0F6E56;font-weight:600;">'+list.length+'件の送信が完了しました（BCC: '+SET.bcc+'）</span>');done.querySelector('svg').style.cssText='width:16px;height:16px;color:#1D9E75;';log.appendChild(done);
      var h=DB.history;list.forEach(function(c){h.push({date:todayISO(),time:todayISO().slice(5).replace('-','/')+' '+stamp,tpl:tplLabel,to:c.name+' 様',from:SET.sender});});DB.history=h;
      return;
    }
    var c=list[i];
    var row=el('div',{class:'li'},spinSvg()+'送信中：'+c.name+' 様 ('+c.email+')');log.appendChild(row);
    setTimeout(function(){row.innerHTML=ic('check')+'<span>'+c.name+' 様 へ送信完了</span>';row.querySelector('svg').style.cssText='width:15px;height:15px;color:#1D9E75;';i++;bar.style.width=Math.round(i/list.length*100)+'%';setTimeout(step,240);},560);
  }
  step();
}

  var bc=BCAST.map(function(x){var sub=x.daily?'デイリーメール構造（カリキュラム差し込み）':fillTokens(BBODY[x.key].subject,null,{});var bd=x.daily?'冒頭ひとこと／Monthly Theme'+(x.daily==='Pre'?'／Phonics／Monthly Song':'')+'／Morning・Afternoon／お知らせ':fillTokens(BBODY[x.key].body,null,{});return '<div class="card"><h3>'+ic('cast')+x.label+'</h3><div class="muted" style="margin-bottom:8px;">件名：'+sub+'</div><div class="preview" style="max-height:160px;">'+bd.replace(/</g,'&lt;')+'</div><div style="margin-top:12px;display:flex;gap:8px;align-items:center;"><button class="btn btn-sm btn-primary" data-bc="'+x.key+'">この文面で配信</button><span class="muted">対象：'+(x.cls||['Pre','Kinder']).join('・')+' 在園児</span></div></div>';}).join('');
  s.innerHTML='<div style="font-size:13px;font-weight:600;margin:0 0 10px;color:var(--tx2);">個別メール（1:1）</div><div class="grid" style="grid-template-columns:1fr 1fr;margin-bottom:22px;">'+indiv+'</div>'+
    '<div style="font-size:13px;font-weight:600;margin:0 0 10px;color:var(--tx2);">全体配信（お知らせ）</div><div class="grid" style="grid-template-columns:1fr 1fr;">'+bc+'</div>';
  s.querySelectorAll('[data-use]').forEach(function(b){b.addEventListener('click',function(){routeTo(['compose',b.getAttribute('data-use')]);});});
  s.querySelectorAll('[data-bc]').forEach(function(b){b.addEventListener('click',function(){routeTo(['broadcast',b.getAttribute('data-bc')]);});});
}

/* ---------- curriculum ---------- */

    '<div class="field"><label>Monthly Theme（今月のテーマ）</label><input id="curTheme" value="'+v(CUR.theme)+'"></div>'+
    '<div style="font-size:12px;color:var(--tx2);margin:6px 0 6px;">Pre デイリーメール用の月次項目</div>'+
    '<div class="grid" style="grid-template-columns:1fr 1fr;"><div class="field"><label>Phonics Letter</label><input id="curPL" value="'+v(CUR.phonicsLetter)+'"></div><div class="field"><label>Phonics Song</label><input id="curPS" value="'+v(CUR.phonicsSong)+'"></div></div>'+
    '<div class="grid" style="grid-template-columns:1fr 1fr;"><div class="field"><label>Monthly Song（English）</label><input id="curSE" value="'+v(CUR.songEN)+'"></div><div class="field"><label>Monthly Song（Japanese）</label><input id="curSJ" value="'+v(CUR.songJP)+'"></div></div>'+
    '<div style="font-size:12px;color:var(--tx2);margin:8px 0 6px;">週ごとの活動計画（活動報告作成時に参照・挿入できます）</div>'+
    '<table><thead><tr><th style="width:64px;">週</th><th>Morning Activity</th><th>Afternoon（Motor skill）</th></tr></thead><tbody>'+
      CUR.weeks.map(function(w,i){return '<tr><td class="row-name">'+w.label+'</td><td><input data-wk="'+i+'" data-fld="morning" value="'+v(w.morning)+'"></td><td><input data-wk="'+i+'" data-fld="afternoon" value="'+v(w.afternoon)+'"></td></tr>';}).join('')+
    '</tbody></table>'+
    '<div style="margin-top:16px;display:flex;gap:10px;align-items:center;flex-wrap:wrap;"><button class="btn btn-primary" id="curSave">'+ic('check')+'保存</button><button class="btn" id="curToAct">'+ic('cast')+'デイリーメールを作成</button><span class="muted" id="curMsg"></span></div></div>';
  $('#curTheme').oninput=function(e){CUR.theme=e.target.value;};
  $('#curPL').oninput=function(e){CUR.phonicsLetter=e.target.value;};
  $('#curPS').oninput=function(e){CUR.phonicsSong=e.target.value;};
  $('#curSE').oninput=function(e){CUR.songEN=e.target.value;};
  $('#curSJ').oninput=function(e){CUR.songJP=e.target.value;};
  s.querySelectorAll('[data-wk]').forEach(function(inp){inp.oninput=function(){CUR.weeks[+inp.getAttribute('data-wk')][inp.getAttribute('data-fld')]=inp.value;};});
  $('#curSave').onclick=function(){DB.curriculum=CUR;$('#curMsg').textContent='保存しました';setTimeout(function(){$('#curMsg').textContent='';},1600);};
  $('#curToAct').onclick=function(){DB.curriculum=CUR;routeTo(['broadcast','dailyPre']);};
}

/* ---------- deliveries (annual calendar) ---------- */
function renderDeliveries(){
  var s=$('section[data-page="deliveries"]');
  var rows=DELIVERIES.map(function(d){var t=nextDelivery(d);return {d:d,t:t};});
  var leads=DB.contacts.filter(function(c){return c.kind==='lead'&&c.date&&new Date(c.date)>=addDays(-1);}).sort(function(a,b){return a.date<b.date?-1:1;});
  s.innerHTML=
    '<div class="card" style="margin-bottom:16px;"><h3>'+ic('cal')+'定期配信スケジュール</h3>'+
      '<table><thead><tr><th>配信</th><th>配信時期</th><th>対象</th><th>次回予定</th><th></th></tr></thead><tbody>'+
        rows.map(function(r){var nd=r.t?(fmt(iso(r.t))+(daysUntil(r.t)<=0?' <span class="tag">本日</span>':' <span class="row-sub">'+daysUntil(r.t)+'日後</span>')):'<span class="row-sub">都度</span>';return '<tr><td class="row-name">'+r.d.label+'</td><td class="row-sub">'+r.d.when+'</td><td>'+r.d.to+'</td><td>'+nd+'</td><td style="text-align:right;"><button class="btn btn-sm btn-primary" data-go2="'+r.d.go.join('|')+'">作成</button></td></tr>';}).join('')+
      '</tbody></table></div>'+
    '<div class="cal-banner" style="margin-bottom:16px;"><div style="width:42px;height:42px;border-radius:12px;background:#EEEDFE;color:#3C3489;display:flex;align-items:center;justify-content:center;">'+ic('cal')+'</div><div style="flex:1;"><div style="font-weight:600;">Googleカレンダー連携（次フェーズ）</div><div class="muted">体験日・説明会・Daycare対象日をカレンダーから取込み、リマインド／サンクス／請求書を予定どおり自動配信。</div></div><button class="btn btn-primary">連携する</button></div>'+
    '<div class="card"><h3>'+ic('clock')+'体験・説明会の予定（リード）</h3>'+
      (leads.length?leads.map(function(c){var sd=fmtShort(c.date);return '<div class="agenda"><div class="date"><div class="d">'+sd.d+'</div><div class="m">'+sd.m+'</div></div><div style="flex:1;"><div class="row-name">'+c.name+' 様 ／ '+c.child+'</div><div class="row-sub">'+fmt(c.date)+' 10:00～ ・ '+(c.status==='体験済'?'体験実施':'体験予約')+'</div></div><span class="pill st-'+c.status+'">'+c.status+'</span></div>';}).join(''):'<div class="empty">予定がありません</div>')+
    '</div>';
  s.querySelectorAll('[data-go2]').forEach(function(b){b.addEventListener('click',function(){routeTo(b.getAttribute('data-go2').split('|'));});});
}

    '<div class="card" style="max-width:620px;margin-bottom:16px;"><h3>'+ic('yen')+'振込口座（請求書・振込お願いで自動差し込み）</h3>'+

      '<div class="grid" style="grid-template-columns:1fr 1fr 1fr;">'+f('s_dcN','Daycare 通常料金',SET.daycareFeeNormal)+f('s_dcE','Daycare 延長料金',SET.daycareFeeExt)+f('s_dcL','スクールランチ',SET.daycareLunch)+'</div>'+

    '<button class="btn btn-primary" id="s_save">'+ic('check')+'保存</button> <span class="muted" id="s_msg"></span>';

    SET.photoUrl=$('#s_photoUrl').value;SET.photoCodePre=$('#s_photoPre').value;SET.photoCodeKinder=$('#s_photoKinder').value;
    SET.daycareFeeNormal=$('#s_dcN').value;SET.daycareFeeExt=$('#s_dcE').value;SET.daycareLunch=$('#s_dcL').value;SET.daycareFormUrl=$('#s_form').value;SET.surveyUrl=$('#s_survey').value;

/* ---------- staff ---------- */
function renderStaff(){
  var st=DB.staff,s=$('section[data-page="staff"]');
  var alerts=st.filter(function(x){var k=kenshinStatus(x.kenshinDate).lab;return k==='期限切れ'||k==='要更新';});
  s.innerHTML=
    (alerts.length?'<div class="cal-banner" style="margin-bottom:16px;background:#FCEBEB;border:1px solid #E24B4A;"><div style="width:40px;height:40px;border-radius:11px;background:#fff;color:#A32D2D;display:flex;align-items:center;justify-content:center;">'+ic('alert')+'</div><div style="flex:1;"><div style="font-weight:600;color:#A32D2D;">健康診断の更新が必要な職員 '+alerts.length+'名</div><div class="muted">'+alerts.map(function(x){return x.name;}).join('・')+'</div></div></div>':'')+
    '<div class="card"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;"><h3 style="margin:0;">'+ic('staff')+'職員名簿</h3><button class="btn btn-primary" id="addStaff">'+ic('plus')+'職員を追加</button></div>'+
      '<table><thead><tr><th>氏名</th><th>役職 / 雇用</th><th>保有資格</th><th>入社日</th><th>健康診断（次回期限）</th><th></th></tr></thead><tbody>'+
      (st.length?st.map(function(x){var ks=kenshinStatus(x.kenshinDate),nd=kenshinNext(x.kenshinDate);return '<tr>'+
        '<td><div class="row-name">'+x.name+'</div><div class="row-sub">'+(x.kana||'')+'</div></td>'+
        '<td>'+x.role+'<div class="row-sub">'+x.employ+'</div></td>'+
        '<td>'+x.qual+'<div class="row-sub">'+(x.qualNo||'')+'</div></td>'+
        '<td>'+(x.joinDate?fmt(x.joinDate):'—')+'</td>'+
        '<td>'+(x.kenshinDate?fmt(x.kenshinDate):'未登録')+(nd?'<div class="row-sub">→ '+fmt(iso(nd))+'</div>':'')+' <span class="pill" style="background:'+ks.bg+';color:'+ks.fg+';">'+ks.lab+'</span></td>'+
        '<td style="text-align:right;white-space:nowrap;"><button class="btn btn-sm btn-ghost" data-edit="'+x.id+'">'+ic('edit')+'</button><button class="btn btn-sm btn-ghost" data-del="'+x.id+'">'+ic('trash')+'</button></td></tr>';}).join(''):'<tr><td colspan="6" class="empty">職員が登録されていません</td></tr>')+
      '</tbody></table></div>';
  $('#addStaff').onclick=function(){staffModal();};
  s.querySelectorAll('[data-edit]').forEach(function(b){b.onclick=function(){staffModal(+b.getAttribute('data-edit'));};});
  s.querySelectorAll('[data-del]').forEach(function(b){b.onclick=function(){if(confirm('この職員を削除しますか？')){DB.staff=DB.staff.filter(function(x){return x.id!==+b.getAttribute('data-del');});renderStaff();}};});
}
function staffModal(id){
  var arr=DB.staff,x=id?arr.filter(function(o){return o.id===id;})[0]:{name:'',kana:'',role:'保育士',employ:'正社員',qual:'',qualNo:'',joinDate:'',kenshinDate:''};
  var emOpts=['正社員','契約社員','パート','業務委託'].map(function(o){return '<option'+(o===x.employ?' selected':'')+'>'+o+'</option>';}).join('');
  var m=el('div',{class:'modal-bg'});
  m.innerHTML='<div class="modal"><h2>'+(id?'職員を編集':'職員を追加')+'</h2>'+
    '<div class="grid" style="grid-template-columns:1fr 1fr;"><div class="field"><label>氏名</label><input id="st_name" value="'+x.name+'"></div><div class="field"><label>ふりがな</label><input id="st_kana" value="'+(x.kana||'')+'"></div></div>'+
    '<div class="grid" style="grid-template-columns:1fr 1fr;"><div class="field"><label>役職</label><input id="st_role" value="'+x.role+'"></div><div class="field"><label>雇用形態</label><select id="st_emp">'+emOpts+'</select></div></div>'+
    '<div class="grid" style="grid-template-columns:1fr 1fr;"><div class="field"><label>保有資格</label><input id="st_qual" value="'+(x.qual||'')+'" placeholder="保育士 等"></div><div class="field"><label>資格証番号</label><input id="st_qno" value="'+(x.qualNo||'')+'"></div></div>'+
    '<div class="grid" style="grid-template-columns:1fr 1fr;"><div class="field"><label>入社日</label><input type="date" id="st_join" value="'+(x.joinDate||'')+'"></div><div class="field"><label>直近の健康診断日</label><input type="date" id="st_ken" value="'+(x.kenshinDate||'')+'"></div></div>'+
    '<div style="display:flex;gap:10px;justify-content:flex-end;margin-top:8px;"><button class="btn" id="st_cancel">キャンセル</button><button class="btn btn-primary" id="st_save">保存</button></div></div>';
  $('#modalRoot').appendChild(m);
  $('#st_cancel').onclick=function(){m.remove();};
  m.addEventListener('click',function(e){if(e.target===m)m.remove();});
  $('#st_save').onclick=function(){
    var nx={id:id||Date.now(),name:$('#st_name').value.trim(),kana:$('#st_kana').value.trim(),role:$('#st_role').value.trim(),employ:$('#st_emp').value,qual:$('#st_qual').value.trim(),qualNo:$('#st_qno').value.trim(),joinDate:$('#st_join').value,kenshinDate:$('#st_ken').value};
    if(!nx.name){alert('氏名は必須です');return;}
    var a=DB.staff;if(id){a=a.map(function(o){return o.id===id?nx:o;});}else{a.push(nx);}DB.staff=a;m.remove();renderStaff();
  };
}

/* ---------- audit ---------- */
function renderAudit(){
  var s=$('section[data-page="audit"]');
  var ph=auditPhase(),stt=auditState(),flat=auditItemsFlat();
  var done=flat.filter(function(it){return stt[it.key]==='済';}).length,tot=flat.length;
  var pre=flat.filter(function(it){return it.when==='年度前';}),preDone=pre.filter(function(it){return stt[it.key]==='済';}).length;
  var ope=flat.filter(function(it){return it.when==='運営中';}),opeDone=ope.filter(function(it){return stt[it.key]==='済';}).length;
  var STO={'未':{bg:'#FCEBEB',fg:'#A32D2D'},'対応中':{bg:'#FAEEDA',fg:'#854F0B'},'済':{bg:'#EAF3DE',fg:'#27500A'}};
  s.innerHTML=
    '<div class="cal-banner" style="margin-bottom:16px;background:'+ph.bg+';border-color:'+ph.color+';"><div style="width:42px;height:42px;border-radius:12px;background:#fff;color:'+ph.color+';display:flex;align-items:center;justify-content:center;">'+ic('audit')+'</div><div style="flex:1;"><div style="font-weight:600;">'+ph.label+'</div><div class="muted">'+ph.desc+'</div></div></div>'+
    '<div class="grid" style="grid-template-columns:1fr 1fr;margin-bottom:16px;">'+
      '<div class="card"><h3>'+ic('cal')+'書類監査</h3><div class="muted" style="margin-bottom:10px;">年1回・日程は固定。実施期間 5〜11月。<b>3週間前に確定連絡</b>が来る。</div><label>確定日（連絡が来たら入力）</label><input type="date" id="auDate" value="'+(SET.docAuditDate||'')+'"><div id="auCount" class="muted" style="margin-top:8px;"></div></div>'+
      '<div class="card"><h3>'+ic('alert')+'現場監査</h3><div class="muted">指定期間（5〜11月）に<b>無通告</b>で実施。年1〜2回。いつ来てもいいよう、運営中に揃える記録を常に整えておく。</div></div>'+
    '</div>'+
    '<div class="card" style="margin-bottom:16px;"><h3>'+ic('clipboard')+'準備状況</h3>'+
      '<div style="display:flex;gap:24px;flex-wrap:wrap;margin-bottom:12px;"><div><div style="font-size:24px;font-weight:600;">'+done+' / '+tot+'</div><div class="muted">全体 済</div></div><div><div style="font-size:24px;font-weight:600;color:#185FA5;">'+preDone+' / '+pre.length+'</div><div class="muted">年度前に準備</div></div><div><div style="font-size:24px;font-weight:600;color:#854F0B;">'+opeDone+' / '+ope.length+'</div><div class="muted">運営中に揃える</div></div></div>'+
      '<div class="pbar"><div style="width:'+Math.round(done/tot*100)+'%"></div></div></div>'+
    AUDIT_CATS.map(function(c){return '<div class="card" style="margin-bottom:14px;"><h3>'+c.cat+'</h3><table><tbody>'+
      c.items.map(function(it){var cur=stt[it.key];var opt=['未','対応中','済'].map(function(o){return '<option'+(o===cur?' selected':'')+'>'+o+'</option>';}).join('');var wc=it.when==='年度前'?'background:#E6F1FB;color:#0C447C':'background:#FAEEDA;color:#854F0B';return '<tr>'+
        '<td style="width:110px;"><select data-st="'+it.key+'" style="background:'+STO[cur].bg+';color:'+STO[cur].fg+';font-weight:500;">'+opt+'</select></td>'+
        '<td><div class="row-name">'+it.name+'</div><div class="row-sub">保管：'+it.place+'</div></td>'+
        '<td style="width:80px;"><span class="pill" style="'+wc+'">'+it.when+'</span></td>'+
        '<td style="width:130px;text-align:right;">'+(it.sys?'<button class="btn btn-sm" data-sys="'+it.sys+'">'+SYS_PAGE[it.sys]+' →</button>':'<span class="row-sub">外部管理</span>')+'</td></tr>';}).join('')+
      '</tbody></table></div>';}).join('');
  function upd(){var d=$('#auDate').value;if(d){var du=daysUntil(new Date(d));$('#auCount').textContent=du>=0?('書類監査まで あと '+du+'日'):'確定日は過ぎています';}else{$('#auCount').textContent='';}}
  upd();
  $('#auDate').onchange=function(e){SET.docAuditDate=e.target.value;DB.settings=SET;upd();};
  s.querySelectorAll('[data-st]').forEach(function(sl){sl.onchange=function(){auditSet(sl.getAttribute('data-st'),sl.value);renderAudit();};});
  s.querySelectorAll('[data-sys]').forEach(function(b){b.onclick=function(){go(b.getAttribute('data-sys'));};});
}

/* ---------- start ---------- */
$('#navContacts').textContent=DB.contacts.length;
go('dashboard');
