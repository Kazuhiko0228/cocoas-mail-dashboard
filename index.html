<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>COCOAS Mail Dashboard｜大宮与野校</title>
<style>
  :root{
    --teal:#0F6E56; --teal-d:#0a4d3c; --teal-l:#1D9E75; --accent:#2bb789;
    --bg:#f4f6f4; --card:#ffffff; --line:#e7e8e3; --line2:#eceee9;
    --tx:#1d2420; --tx2:#5f6b64; --tx3:#90998f;
    --blue-b:#E6F1FB; --blue-t:#0C447C;
    --amber-b:#FAEEDA; --amber-t:#854F0B;
    --green-b:#EAF3DE; --green-t:#27500A;
    --gray-b:#F1EFE8; --gray-t:#5F5E5A;
    --purple-b:#EEEDFE; --purple-t:#3C3489;
    --radius:14px;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    font-family:system-ui,-apple-system,"Hiragino Kaku Gothic ProN","Hiragino Sans","Noto Sans JP",sans-serif;
    background:var(--bg); color:var(--tx); font-size:14px; line-height:1.6;
    -webkit-font-smoothing:antialiased;
  }
  .app{display:flex; min-height:100vh;}

  /* sidebar */
  .sidebar{
    width:248px; background:var(--teal-d); color:#dfeee8; flex-shrink:0;
    display:flex; flex-direction:column; position:sticky; top:0; height:100vh;
  }
  .brand{padding:20px 20px 16px; display:flex; align-items:center; gap:11px; border-bottom:1px solid rgba(255,255,255,.08);}
  .brand .logo{width:38px;height:38px;border-radius:10px;background:var(--accent);display:flex;align-items:center;justify-content:center;color:#06281f;flex-shrink:0;}
  .brand .name{font-size:15px;font-weight:600;color:#fff;line-height:1.2;}
  .brand .sub{font-size:11px;color:#9fc7b8;}
  .nav{padding:12px 12px; flex:1; overflow:auto;}
  .nav-label{font-size:10.5px;letter-spacing:.08em;color:#7faa9b;padding:14px 12px 6px;text-transform:uppercase;}
  .nav a{
    display:flex; align-items:center; gap:11px; padding:10px 12px; border-radius:10px;
    color:#cfe3da; text-decoration:none; font-size:13.5px; margin-bottom:2px; cursor:pointer;
  }
  .nav a:hover{background:rgba(255,255,255,.07); color:#fff;}
  .nav a.active{background:var(--teal-l); color:#fff; font-weight:500;}
  .nav a svg{width:18px;height:18px;flex-shrink:0;}
  .nav .badge{margin-left:auto;background:#f0a23a;color:#3a2403;font-size:11px;font-weight:600;padding:1px 7px;border-radius:99px;}
  .side-foot{padding:14px 18px;border-top:1px solid rgba(255,255,255,.08);font-size:11.5px;color:#9fc7b8;}

  /* main */
  .main{flex:1; min-width:0; display:flex; flex-direction:column;}
  .topbar{
    background:var(--card); border-bottom:1px solid var(--line); padding:14px 26px;
    display:flex; align-items:center; gap:16px; position:sticky; top:0; z-index:20;
  }
  .topbar h1{font-size:18px;font-weight:600;margin:0;}
  .topbar .crumb{font-size:12px;color:var(--tx3);}
  .spacer{flex:1;}
  .sender-chip{display:flex;align-items:center;gap:7px;font-size:12.5px;color:var(--tx2);background:var(--bg);padding:7px 12px;border-radius:10px;border:1px solid var(--line);}
  .content{padding:24px 26px; max-width:1140px; width:100%;}
  section[data-page][hidden]{display:none;}

  /* buttons */
  button{font-family:inherit;cursor:pointer;}
  .btn{display:inline-flex;align-items:center;gap:7px;font-size:13.5px;padding:9px 15px;border-radius:10px;border:1px solid var(--line);background:#fff;color:var(--tx);transition:.12s;}
  .btn:hover{background:#f7f8f6;}
  .btn svg{width:16px;height:16px;}
  .btn-primary{background:var(--teal);border-color:var(--teal);color:#fff;font-weight:500;}
  .btn-primary:hover{background:var(--teal-d);}
  .btn-sm{padding:6px 11px;font-size:12.5px;}
  .btn-ghost{border-color:transparent;background:transparent;color:var(--tx2);}
  .btn-ghost:hover{background:#f0f1ee;}
  .btn[disabled]{opacity:.5;cursor:not-allowed;}

  /* cards */
  .grid{display:grid;gap:16px;}
  .card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:18px 20px;}
  .card h3{font-size:14.5px;font-weight:600;margin:0 0 14px;display:flex;align-items:center;gap:8px;}
  .card h3 svg{width:17px;height:17px;color:var(--teal);}
  .metric{display:flex;align-items:center;gap:14px;}
  .metric .ico{width:46px;height:46px;border-radius:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
  .metric .ico svg{width:22px;height:22px;}
  .metric .num{font-size:26px;font-weight:600;line-height:1;}
  .metric .lab{font-size:12.5px;color:var(--tx2);margin-top:3px;}

  /* pills */
  .pill{font-size:11.5px;padding:3px 9px;border-radius:99px;white-space:nowrap;font-weight:500;}
  .st-問い合わせ{background:var(--gray-b);color:var(--gray-t);}
  .st-体験予約{background:var(--blue-b);color:var(--blue-t);}
  .st-体験済{background:var(--amber-b);color:var(--amber-t);}
  .st-入園意向{background:var(--green-b);color:var(--green-t);}
  .st-入園決定{background:var(--purple-b);color:var(--purple-t);}

  /* table */
  table{width:100%;border-collapse:collapse;}
  th{text-align:left;font-size:11.5px;color:var(--tx3);font-weight:500;padding:8px 10px;border-bottom:1px solid var(--line);text-transform:uppercase;letter-spacing:.03em;}
  td{padding:11px 10px;border-bottom:1px solid var(--line2);font-size:13.5px;vertical-align:middle;}
  tr:last-child td{border-bottom:none;}
  .row-name{font-weight:500;}
  .row-sub{font-size:12px;color:var(--tx3);}
  .avatar{width:34px;height:34px;border-radius:50%;background:var(--teal-l);color:#fff;display:inline-flex;align-items:center;justify-content:center;font-size:12.5px;font-weight:600;}

  /* inputs */
  input,select,textarea{font-family:inherit;font-size:13.5px;color:var(--tx);background:#fff;border:1px solid var(--line);border-radius:10px;padding:9px 11px;width:100%;outline:none;}
  input:focus,select:focus,textarea:focus{border-color:var(--teal-l);box-shadow:0 0 0 3px rgba(29,158,117,.13);}
  label{font-size:12px;color:var(--tx2);display:block;margin-bottom:5px;}
  .field{margin-bottom:14px;}

  /* task item */
  .task{display:flex;align-items:center;gap:12px;padding:11px 0;border-bottom:1px solid var(--line2);}
  .task:last-child{border-bottom:none;}
  .task .tdot{width:9px;height:9px;border-radius:50%;flex-shrink:0;}

  /* funnel */
  .funnel-row{display:flex;align-items:center;gap:12px;margin-bottom:9px;}
  .funnel-row .fl{width:78px;font-size:12.5px;color:var(--tx2);}
  .funnel-bar{flex:1;height:24px;background:#f0f1ee;border-radius:7px;overflow:hidden;}
  .funnel-bar > div{height:100%;border-radius:7px;display:flex;align-items:center;padding-left:9px;color:#fff;font-size:12px;font-weight:600;}

  /* compose recipients */
  .reci{display:flex;align-items:center;gap:10px;padding:9px 11px;border:1px solid var(--line);border-radius:10px;margin-bottom:7px;cursor:pointer;background:#fff;}
  .reci.on{border-color:var(--teal-l);background:#f1faf6;}
  .reci input{width:auto;}
  .chips{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:12px;}
  .chip{font-size:12px;padding:5px 12px;border-radius:99px;border:1px solid var(--line);background:#fff;color:var(--tx2);cursor:pointer;}
  .chip.on{background:var(--teal);border-color:var(--teal);color:#fff;}

  .preview{background:var(--bg);border:1px solid var(--line);border-radius:10px;padding:13px 15px;white-space:pre-wrap;font-size:12.8px;line-height:1.7;max-height:300px;overflow:auto;}
  .send-log{display:flex;flex-direction:column;gap:7px;margin-top:12px;}
  .send-log .li{display:flex;align-items:center;gap:9px;font-size:12.8px;color:var(--tx2);}
  .pbar{height:7px;background:#eceee9;border-radius:99px;overflow:hidden;margin-top:6px;}
  .pbar > div{height:100%;width:0;background:var(--teal-l);transition:width .25s;}

  /* modal */
  .modal-bg{position:fixed;inset:0;background:rgba(20,28,24,.45);display:flex;align-items:center;justify-content:center;z-index:60;padding:20px;}
  .modal{background:#fff;border-radius:16px;width:480px;max-width:100%;max-height:90vh;overflow:auto;padding:24px;}
  .modal h2{font-size:17px;margin:0 0 18px;}

  /* schedule agenda */
  .agenda{display:flex;gap:14px;align-items:flex-start;padding:14px 0;border-bottom:1px solid var(--line2);}
  .agenda:last-child{border-bottom:none;}
  .agenda .date{width:62px;flex-shrink:0;text-align:center;}
  .agenda .date .d{font-size:22px;font-weight:600;line-height:1;}
  .agenda .date .m{font-size:11px;color:var(--tx3);}
  .cal-banner{background:linear-gradient(0deg,#f1faf6,#f1faf6);border:1px dashed var(--teal-l);border-radius:var(--radius);padding:16px 18px;display:flex;align-items:center;gap:14px;}

  .muted{color:var(--tx2);font-size:12.5px;}
  .empty{text-align:center;color:var(--tx3);padding:30px;font-size:13px;}
  @media(max-width:880px){.sidebar{display:none;} .content{padding:18px;}}
</style>
</head>

</div>

function ic(n){return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">'+(ICONS[n]||'')+'</svg>';}

/* ---------- date helpers ---------- */
var WD=['日','月','火','水','木','金','土'];
function pad(n){return n<10?'0'+n:''+n;}
function iso(d){return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate());}
function addDays(n){var d=new Date();d.setHours(0,0,0,0);d.setDate(d.getDate()+n);return d;}
function todayISO(){return iso(addDays(0));}
function fmt(isoStr){if(!isoStr)return'';var p=isoStr.split('-');var d=new Date(+p[0],+p[1]-1,+p[2]);return (+p[1])+'/'+(+p[2])+'（'+WD[d.getDay()]+'）';}
function fmtShort(isoStr){var p=isoStr.split('-');return {d:+p[2],m:(+p[1])+'月'};}

var composePreset=null,composeSelectId=null,composeSel={},composeTpl='thanks',composeFilter='すべて';
function renderCompose(){
  if(composePreset){composeTpl=composePreset;composePreset=null;}
  if(composeSelectId){composeSel={};composeSel[composeSelectId]=true;composeSelectId=null;}
  var cs=DB.contacts;
  var s=$('section[data-page="compose"]');
  s.innerHTML=
    '<div class="grid" style="grid-template-columns:1fr 1.15fr;align-items:start;">'+
      '<div class="card"><h3>'+ic('users')+'送信先を選ぶ</h3>'+
        '<div class="chips" id="cmpChips"></div>'+
        '<label style="display:flex;align-items:center;gap:8px;margin-bottom:10px;cursor:pointer;font-size:12.5px;"><input type="checkbox" id="cmpAll" style="width:auto;">表示中をすべて選択</label>'+
        '<div id="cmpList"></div>'+
      '</div>'+
      '<div class="card"><h3>'+ic('doc')+'文面</h3>'+
        '<div style="display:flex;gap:8px;margin-bottom:12px;"><select id="cmpTpl" style="flex:1;"></select><button class="btn btn-sm" id="cmpAuto">対象者を自動選択</button></div>'+
        '<div class="field"><label>件名</label><input id="cmpSubject"></div>'+
        '<div class="field"><label>本文テンプレート（〔 〕は宛先ごとに自動差し込み）</label><textarea id="cmpBody" rows="8"></textarea></div>'+
        '<label>プレビュー</label><div class="preview" id="cmpPreview"></div>'+
      '</div>'+
    '</div>'+
    '<div class="card" style="margin-top:16px;"><h3>'+ic('send')+'送信</h3>'+
      '<div class="grid" style="grid-template-columns:1fr 1fr;margin-bottom:14px;">'+
        '<div><label>送信元アドレス</label><input value="'+SET.sender+'" readonly style="background:#f7f8f6;"></div>'+
        '<div><label>BCC（本部共有・自動付与）</label><input value="'+SET.bcc+'" readonly style="background:#f7f8f6;"></div>'+
      '</div>'+
      '<div style="display:flex;align-items:center;gap:14px;flex-wrap:wrap;"><button class="btn btn-primary" id="cmpSend">'+ic('send')+'選択した宛先へ順番に送信</button><span class="muted" id="cmpCount"></span></div>'+
      '<div class="pbar"><div id="cmpBar"></div></div>'+
      '<div class="send-log" id="cmpLog"></div>'+
    '</div>';

  var sel=$('#cmpTpl');sel.innerHTML=Object.keys(TEMPLATES).map(function(k){return '<option value="'+k+'">'+TEMPLATES[k].label+'</option>';}).join('');sel.value=composeTpl;
  function loadTpl(){var t=TEMPLATES[composeTpl];$('#cmpSubject').value=t.subject;$('#cmpBody').value=t.body;preview();}
  function chips(){var f=['すべて','問い合わせ','体験予約','体験済','入園意向','入園決定'];$('#cmpChips').innerHTML=f.map(function(x){return '<span class="chip'+(x===composeFilter?' on':'')+'" data-f="'+x+'">'+x+'</span>';}).join('');$('#cmpChips').querySelectorAll('[data-f]').forEach(function(b){b.onclick=function(){composeFilter=b.getAttribute('data-f');list();chips();};});}
  function shown(){return cs.filter(function(c){return composeFilter==='すべて'||c.status===composeFilter;});}
  function list(){
    $('#cmpList').innerHTML=shown().map(function(c){var on=!!composeSel[c.id];return '<div class="reci'+(on?' on':'')+'" data-id="'+c.id+'"><input type="checkbox" '+(on?'checked':'')+'><div style="flex:1;min-width:0;"><div class="row-name">'+c.name+' 様 <span class="row-sub">／ '+c.child+'</span></div><div class="row-sub" style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">'+c.email+'</div></div><span class="pill st-'+c.status+'">'+c.status+'</span></div>';}).join('')||'<div class="empty">該当者なし</div>';
    $('#cmpList').querySelectorAll('[data-id]').forEach(function(r){r.onclick=function(e){var id=+r.getAttribute('data-id');composeSel[id]=!composeSel[id];list();preview();syncAll();};});
    syncAll();preview();
  }
  function syncAll(){var sh=shown();$('#cmpAll').checked=sh.length>0&&sh.every(function(c){return composeSel[c.id];});var n=Object.keys(composeSel).filter(function(k){return composeSel[k];}).length;$('#cmpCount').textContent=n?n+' 件を選択中':'送信先を選択してください';}
  function selectedContacts(){return cs.filter(function(c){return composeSel[c.id];});}
  function preview(){var sc=selectedContacts();var c=sc.length?sc[0]:cs[0];$('#cmpPreview').textContent=(sc.length?'宛先: '+c.name+' 様（プレビュー）\n':'')+'件名: '+fillVars($('#cmpSubject').value,c)+'\n\n'+fillVars($('#cmpBody').value,c);}

  $('#cmpTpl').onchange=function(e){composeTpl=e.target.value;loadTpl();};
  $('#cmpAuto').onclick=function(){var t=TEMPLATES[composeTpl];composeSel={};cs.forEach(function(c){if(t.targets.indexOf(c.status)>-1)composeSel[c.id]=true;});list();};
  $('#cmpAll').onclick=function(e){shown().forEach(function(c){composeSel[c.id]=e.target.checked;});list();};
  $('#cmpSubject').oninput=preview;$('#cmpBody').oninput=preview;
  $('#cmpSend').onclick=function(){send(selectedContacts());};

  function send(list){
    if(!list.length){$('#cmpLog').innerHTML='<div class="li" style="color:#A32D2D;">送信先が選択されていません。</div>';return;}
    var btn=$('#cmpSend');btn.disabled=true;
    var log=$('#cmpLog');log.innerHTML='';$('#cmpBar').style.width='0%';
    var tplLabel=TEMPLATES[composeTpl].label,i=0,now=new Date();
    var stamp=pad(now.getHours())+':'+pad(now.getMinutes());
    function step(){
      if(i>=list.length){
        btn.disabled=false;
        var done=el('div',{class:'li'},ic('check')+'<span style="color:#0F6E56;font-weight:600;">'+list.length+'件の送信が完了しました（BCC: '+SET.bcc+'）</span>');done.querySelector('svg').style.cssText='width:16px;height:16px;color:#1D9E75;';log.appendChild(done);
        var h=DB.history;list.forEach(function(c){h.push({date:todayISO(),time:todayISO().slice(5).replace('-','/')+' '+stamp,tpl:tplLabel,to:c.name+' 様',from:SET.sender});});DB.history=h;
        return;
      }
      var c=list[i];
      var row=el('div',{class:'li'},'<svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="#185FA5" stroke-width="2"><circle cx="12" cy="12" r="9" opacity=".3"/><path d="M12 3a9 9 0 0 1 9 9"/></svg>送信中：'+c.name+' 様 ('+c.email+')');log.appendChild(row);
      setTimeout(function(){
        row.innerHTML=ic('check')+'<span>'+c.name+' 様 ('+c.email+') へ送信完了</span>';row.querySelector('svg').style.cssText='width:15px;height:15px;color:#1D9E75;';
        i++;$('#cmpBar').style.width=Math.round(i/list.length*100)+'%';setTimeout(step,260);
      },620);
    }
    step();
  }

  chips();loadTpl();list();
}

  s.innerHTML=
    '<div class="cal-banner" style="margin-bottom:16px;"><div style="width:42px;height:42px;border-radius:12px;background:#EEEDFE;color:#3C3489;display:flex;align-items:center;justify-content:center;">'+ic('cal')+'</div><div style="flex:1;"><div style="font-weight:600;">Googleカレンダー連携</div><div class="muted">体験日・説明会の予定をカレンダーから自動取込み。前日リマインド／当日サンクスを自動送信できます。</div></div><button class="btn btn-primary">連携する</button></div>'+
    '<div class="card"><h3>'+ic('cal')+'今後の予定と自動アクション</h3>'+
      (cs.length?cs.map(function(c){
        var sd=fmtShort(c.date);var isThanks=c.status==='体験済';var auto=isThanks?'当日サンクス':'前日リマインド';
        return '<div class="agenda"><div class="date"><div class="d">'+sd.d+'</div><div class="m">'+sd.m+'</div></div>'+
          '<div style="flex:1;"><div class="row-name">'+c.name+' 様 ／ '+c.child+'</div><div class="row-sub">'+fmt(c.date)+' 10:00～ ・ '+(isThanks?'体験実施':'体験予約')+'</div></div>'+
          '<div style="text-align:right;"><span class="pill st-'+c.status+'">'+c.status+'</span><div class="muted" style="margin-top:6px;display:flex;align-items:center;gap:5px;justify-content:flex-end;"><span style="width:13px;height:13px;display:inline-block;color:#1D9E75;">'+ic('clock')+'</span>自動：'+auto+'</div></div></div>';
      }).join(''):'<div class="empty">予定がありません</div>')+
    '</div>';
}

/* ---------- settings ---------- */
function renderSettings(){
  var s=$('section[data-page="settings"]');
  s.innerHTML='<div class="card" style="max-width:560px;"><h3>'+ic('gear')+'送信設定</h3>'+
    '<div class="field"><label>送信元アドレス</label><input id="s_sender" value="'+SET.sender+'"></div>'+
    '<div class="field"><label>BCC（本部共有用・全送信に自動付与）</label><input id="s_bcc" value="'+SET.bcc+'"></div>'+
    '<div class="field"><label>学校名</label><input id="s_school" value="'+SET.school+'"></div>'+
    '<div class="field"><label>担当者名（署名）</label><input id="s_manager" value="'+SET.manager+'"></div>'+
    '<button class="btn btn-primary" id="s_save">保存</button> <span class="muted" id="s_msg"></span>'+
  '</div>';
  $('#s_save').onclick=function(){SET.sender=$('#s_sender').value;SET.bcc=$('#s_bcc').value;SET.school=$('#s_school').value;SET.manager=$('#s_manager').value;DB.settings=SET;$('#s_msg').textContent='保存しました';setTimeout(function(){$('#s_msg').textContent='';},1800);};
}

/* ---------- activity report (broadcast) ---------- */
var actSel=null, actDate=null;
function renderActivity(){
  if(!actSel){actSel={};CLASSES.forEach(function(c){actSel[c.key]=true;});}
  if(!actDate)actDate=todayISO();
  var s=$('section[data-page="activity"]');
  s.innerHTML=
   '<div class="grid" style="grid-template-columns:1.2fr 1fr;align-items:start;">'+
     '<div class="card"><h3>'+ic('report')+'本日の活動報告</h3>'+
       '<div class="grid" style="grid-template-columns:150px 1fr;align-items:center;margin-bottom:6px;"><div class="field" style="margin-bottom:0;"><label>配信日</label><input type="date" id="actDate" value="'+actDate+'"></div><div style="padding-top:14px;"><div class="muted" id="actWeek"></div></div></div>'+
       '<div class="field"><label>【Morning Activity】<button class="btn btn-sm btn-ghost" id="insM" style="float:right;padding:2px 9px;">カリキュラムを挿入</button></label><textarea id="actM" rows="4"></textarea></div>'+
       '<div class="field"><label>【Afternoon Activity】<button class="btn btn-sm btn-ghost" id="insA" style="float:right;padding:2px 9px;">カリキュラムを挿入</button></label><textarea id="actA" rows="3"></textarea></div>'+
       '<label style="display:flex;align-items:center;gap:8px;cursor:pointer;font-size:12.5px;"><input type="checkbox" id="actAttach" checked style="width:auto;">月間カリキュラム概要を本文末尾に添付する</label>'+
     '</div>'+
     '<div class="card"><h3>'+ic('mail')+'プレビュー</h3><div class="preview" id="actPreview" style="max-height:440px;"></div></div>'+
   '</div>'+
   '<div class="card" style="margin-top:16px;"><h3>'+ic('cast')+'全体配信</h3>'+
     '<label>配信先（在園児保護者）</label><div class="chips" id="actChips" style="margin-top:6px;"></div>'+
     '<div style="display:flex;align-items:center;gap:14px;flex-wrap:wrap;margin-top:6px;"><button class="btn btn-primary" id="actSend">'+ic('cast')+'全体配信する</button><span class="muted" id="actCount"></span></div>'+
     '<div class="pbar"><div id="actBar"></div></div>'+
     '<div class="send-log" id="actLog"></div>'+
   '</div>';
  $('#actM').value="本日はoutsideの代わりにindoorで沢山体を動かしました🎵\n2歳児さんたちは主にリレーとボールキックを楽しみ、1歳児さんたちは音楽に合わせてexcercieを楽しみました😊\n皆とても楽しそうに活動できていましたよ😊✨";
  $('#actA').value="Motorskillでは、opposite wordsを学びました。本日はflower paperをripして\"soft\"の手触りを実体験する事を楽しんだPreさんたちです🌼";
  function wk(){return CUR.weeks[weekOfMonth(actDate)-1]||CUR.weeks[0];}
  function refWeek(){var w=wk();$('#actWeek').innerHTML='今週の計画：<b>'+w.label+'</b>　Morning '+w.morning+'／Afternoon '+w.afternoon;}
  function classCount(){return CLASSES.filter(function(c){return actSel[c.key];}).reduce(function(a,c){return a+c.n;},0);}
  function chips(){
    var total=CLASSES.reduce(function(a,c){return a+c.n;},0);
    var allOn=CLASSES.every(function(c){return actSel[c.key];});
    $('#actChips').innerHTML='<span class="chip'+(allOn?' on':'')+'" data-c="__all">全クラス（'+total+'名）</span>'+CLASSES.map(function(c){return '<span class="chip'+(actSel[c.key]?' on':'')+'" data-c="'+c.key+'">'+c.key+'（'+c.n+'名）</span>';}).join('');
    $('#actChips').querySelectorAll('[data-c]').forEach(function(b){b.onclick=function(){var k=b.getAttribute('data-c');if(k==='__all'){var on=!CLASSES.every(function(c){return actSel[c.key];});CLASSES.forEach(function(c){actSel[c.key]=on;});}else{actSel[k]=!actSel[k];}chips();count();};});
  }
  function count(){var n=classCount();$('#actCount').textContent=n?'計 '+n+'名へ一斉配信':'配信先を選択してください';}
  function buildEmail(){
    var p=actDate.split('-');
    var subj='【'+(+p[1])+'月'+(+p[2])+'日】本日の活動報告｜COCOAS KIDS 大宮与野校';
    var body='保護者の皆さま\n\nいつもお世話になっております。COCOAS KIDS 大宮与野校です。\n本日（'+fmt(actDate)+'）の活動の様子をお届けします🌟\n\n【Morning Activity】\n'+$('#actM').value+'\n\n【Afternoon Activity】\n'+$('#actA').value;
    if($('#actAttach').checked){
      body+='\n\n━━━━━━━━━━━━\n【今月のカリキュラム（'+(+CUR.month.split('-')[1])+'月）】\nテーマ：'+CUR.theme+'\n'+CUR.weeks.map(function(w){return '・'+w.label+'：'+w.morning+' ／ '+w.afternoon;}).join('\n');
    }
    body+='\n\n引き続きどうぞよろしくお願いいたします。\n'+SET.school;
    return {subject:subj,body:body};
  }
  function preview(){var e=buildEmail();$('#actPreview').textContent='件名: '+e.subject+'\n\n'+e.body;}
  $('#actDate').onchange=function(e){actDate=e.target.value;refWeek();preview();};
  $('#actM').oninput=preview;$('#actA').oninput=preview;$('#actAttach').onchange=preview;
  $('#insM').onclick=function(){var w=wk();$('#actM').value+=($('#actM').value?'\n':'')+w.morning;preview();};
  $('#insA').onclick=function(){var w=wk();$('#actA').value+=($('#actA').value?'\n':'')+w.afternoon;preview();};
  $('#actSend').onclick=function(){
    var groups=CLASSES.filter(function(c){return actSel[c.key];});
    if(!groups.length){$('#actLog').innerHTML='<div class="li" style="color:#A32D2D;">配信先が選択されていません。</div>';return;}
    var btn=$('#actSend');btn.disabled=true;var log=$('#actLog');log.innerHTML='';$('#actBar').style.width='0%';
    var total=classCount(),sent=0,i=0,now=new Date(),stamp=pad(now.getHours())+':'+pad(now.getMinutes());
    function step(){
      if(i>=groups.length){
        btn.disabled=false;
        var done=el('div',{class:'li'},ic('check')+'<span style="color:#0F6E56;font-weight:600;">計 '+total+'名へ全体配信が完了しました（BCC: '+SET.bcc+'）</span>');done.querySelector('svg').style.cssText='width:16px;height:16px;color:#1D9E75;';log.appendChild(done);
        var h=DB.history;h.push({date:todayISO(),time:todayISO().slice(5).replace('-','/')+' '+stamp,tpl:'活動報告（全体配信）',to:total+'名（'+groups.map(function(g){return g.key;}).join('・')+'）',from:SET.sender});DB.history=h;
        return;
      }
      var g=groups[i];
      var row=el('div',{class:'li'},'<svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="#185FA5" stroke-width="2"><circle cx="12" cy="12" r="9" opacity=".3"/><path d="M12 3a9 9 0 0 1 9 9"/></svg>'+g.key+'クラス '+g.n+'名へ配信中…');log.appendChild(row);
      setTimeout(function(){row.innerHTML=ic('check')+'<span>'+g.key+'クラス '+g.n+'名へ配信完了</span>';row.querySelector('svg').style.cssText='width:15px;height:15px;color:#1D9E75;';sent+=g.n;i++;$('#actBar').style.width=Math.round(sent/total*100)+'%';setTimeout(step,420);},620);
    }
    step();
  };
  chips();count();refWeek();preview();
}

/* ---------- monthly curriculum ---------- */
function renderCurriculum(){
  var s=$('section[data-page="curriculum"]');
  var y=CUR.month.split('-')[0],mo=+CUR.month.split('-')[1];
  s.innerHTML='<div class="card" style="max-width:780px;"><h3>'+ic('book')+'月間カリキュラム（'+y+'年 '+mo+'月）</h3>'+
    '<div class="field"><label>今月のテーマ</label><input id="curTheme" value="'+CUR.theme.replace(/"/g,'&quot;')+'"></div>'+
    '<table><thead><tr><th style="width:70px;">週</th><th>Morning Activity</th><th>Afternoon（Motor skill）</th></tr></thead><tbody>'+
      CUR.weeks.map(function(w,idx){return '<tr><td class="row-name">'+w.label+'</td><td><input data-wk="'+idx+'" data-fld="morning" value="'+w.morning.replace(/"/g,'&quot;')+'"></td><td><input data-wk="'+idx+'" data-fld="afternoon" value="'+w.afternoon.replace(/"/g,'&quot;')+'"></td></tr>';}).join('')+
    '</tbody></table>'+
    '<div style="margin-top:16px;display:flex;gap:10px;align-items:center;flex-wrap:wrap;"><button class="btn btn-primary" id="curSave">'+ic('check')+'保存</button><button class="btn" id="curToActivity">'+ic('cast')+'この内容で活動報告を作成</button><span class="muted" id="curMsg"></span></div>'+
    '<div class="muted" style="margin-top:12px;">この週ごとの計画が、活動報告作成時に「今週の計画」として自動表示され、ワンクリックで本文に挿入できます。</div>'+
  '</div>';
  $('#curTheme').oninput=function(e){CUR.theme=e.target.value;};
  s.querySelectorAll('[data-wk]').forEach(function(inp){inp.oninput=function(){CUR.weeks[+inp.getAttribute('data-wk')][inp.getAttribute('data-fld')]=inp.value;};});
  $('#curSave').onclick=function(){DB.curriculum=CUR;$('#curMsg').textContent='保存しました';setTimeout(function(){$('#curMsg').textContent='';},1600);};
  $('#curToActivity').onclick=function(){DB.curriculum=CUR;go('activity');};
}

/* ---------- start ---------- */
$('#navContacts').textContent=DB.contacts.length;
go('dashboard');
</script>
